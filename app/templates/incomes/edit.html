{% extends "base.html" %}
{% block title %}Edit Income{% endblock %}

{% block content %}
<h1 class="text-3xl font-semibold mb-2">Edit Income</h1>
<p class="text-slate-400 mb-6">Update income details.</p>

<section class="max-w-xl rounded-2xl border border-slate-800 bg-slate-900 p-4">
  <form method="post"
        action="{{ url_for('incomes.edit_post', income_id=income.id) }}"
        class="space-y-3">

    <label class="block text-sm">
      <span class="block mb-1 text-slate-300">Source</span>
      <input name="source"
             value="{{ income.source }}"
             class="w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2">
    </label>

    <div class="grid grid-cols-2 gap-3">
      <label class="block text-sm">
        <span class="block mb-1 text-slate-300">Amount</span>
        <input type="number" step="0.01" min="0.01"
               name="amount"
               value="{{ '%.2f'|format(income.amount) }}"
               class="w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2">
      </label>

      <label class="block text-sm">
        <span class="block mb-1 text-slate-300">Date</span>
        <input type="date"
               name="date"
               value="{{ income.date.strftime('%Y-%m-%d') }}"
               class="w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2">
      </label>
    </div>

    <label class="block text-sm">
      <span class="block mb-1 text-slate-300">Category</span>
      <select name="category"
              class="w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2">
        {% for c in categories %}
          <option value="{{ c }}" {% if income.category == c %}selected{% endif %}>
            {{ c }}
          </option>
        {% endfor %}
      </select>
    </label>

    <div class="flex gap-2">
      <button class="rounded-xl bg-brand/20 hover:bg-brand/30 text-brand px-4 py-2 border border-brand/30">
        Save
      </button>
      <a href="{{ url_for('incomes.index') }}"
         class="rounded-xl bg-slate-800 hover:bg-slate-700 px-4 py-2 border border-slate-700">
        Cancel
      </a>
    </div>
  </form>
</section>
{% endblock %}
