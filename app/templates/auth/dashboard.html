{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-2">
  Welcome, {{ current_user.username }}
</h1>

<p class="text-slate-400 mb-6">
  Manage your account or go to expenses.
</p>

<div class="flex gap-3">
  <a href="{{ url_for('expenses.index') }}"
     class="rounded-lg bg-brand/20 text-brand px-4 py-2 hover:bg-brand/30">
    Go to Expenses
  </a>

  <a href="{{ url_for('auth.change_password') }}"
     class="rounded-lg bg-slate-800 px-4 py-2 hover:bg-slate-700">
    Change password
  </a>
</div>
{% endblock %}
