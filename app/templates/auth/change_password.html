{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<section class="max-w-md mx-auto">
  <div class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
    <h1 class="text-xl font-semibold mb-4">Change password</h1>

    {% if errors %}
      <ul class="mb-4 text-rose-300 text-sm list-disc list-inside">
        {% for e in errors %}
          <li>{{ e }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="post" class="space-y-4">
      <input name="current_password" type="password" placeholder="Current password" required
        class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2">

      <input name="new_password" type="password" placeholder="New password" required
        class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2">

      <input name="confirm_password" type="password" placeholder="Confirm new password" required
        class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2">

      <button class="w-full rounded-lg bg-brand/20 hover:bg-brand/30 text-brand px-4 py-2">
        Update password
      </button>
    </form>
  </div>
</section>
{% endblock %}
