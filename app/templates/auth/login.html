{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="max-w-md mx-auto">
  <div class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
    <h1 class="text-2xl font-semibold mb-1">Login</h1>
    <p class="text-slate-400 text-sm mb-4">Sign in to your account</p>

    {% if errors %}
      <ul class="mb-4 text-rose-300 text-sm list-disc list-inside">
        {% for e in errors %}
          <li>{{ e }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="post" class="space-y-4">
      <input type="hidden" name="next" value="{{ request.args.get('next','') }}">

      <input name="email" type="email" placeholder="Email" required
        class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2">

      <input name="password" type="password" placeholder="Password" required
        class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2">

      <label class="flex items-center gap-2 text-sm text-slate-400">
        <input type="checkbox" name="remember" value="1"> Remember me
      </label>

      <button class="w-full rounded-lg bg-brand/20 hover:bg-brand/30 text-brand px-4 py-2">
        Login
      </button>
    </form>
  </div>
</section>
{% endblock %}
